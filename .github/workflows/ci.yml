---
name: Run CI Tests

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'feature/action'
  pull_request:
  workflow_dispatch:  # Allows to trigger the workflow manually in GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 50
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['21']
        type: ['community']
        include:
          - tag: '10.5'
          - tag: '10.6'
          - tag: '10.11'
          - tag: '11.4'
            java_version: '8'
            mvn_profile: 'java8'
          - tag: '11.4'
            java_version: '17'
          - tag: '10.5'
            type: 'enterprise'
            if: github.event_name != 'pull_request'
            registry_user: secrets.ENTERPRISE_USER
            registry_password: secrets.ENTERPRISE_TOKEN
          - tag: '10.6'
            type: 'enterprise'
            if: github.event_name != 'pull_request'
            registry_user: secrets.ENTERPRISE_USER
            registry_password: secrets.ENTERPRISE_TOKEN
          - tag: '11.4'
            type: 'enterprise'
            if: github.event_name != 'pull_request'
            registry_user: secrets.ENTERPRISE_USER
            registry_password: secrets.ENTERPRISE_TOKEN
          - tag: '8.0'
            type: 'mysql'
    env:
      TEST_DB_HOST: localhost
      TEST_DB_PORT: 3306
      TEST_DB_USER: boby
      TEST_DB_PASSWORD: 'heyPassw-!*20oRd'
      TEST_DB_DATABASE: testj
    steps:
      - uses: actions/checkout@v4

      - run: |
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java_version }}
          cache: maven
          distribution: 'adopt'

      - name: Set env
        run: echo "registry=$([ "${{ matrix.type }}" = "community" ] && echo "docker.io/mariadb" || echo "docker.mariadb.com/enterprise-server")" >> $GITHUB_ENV

      - name: Set up MariaDB Server
        if: ${{ matrix.type != 'mysql' }}
        uses: rusher/setup-mariadb@v1
        with:
          tag : ${{ matrix.tag }}
          registry: ${{ registry }}
          root-password: "$TEST_DB_PASSWORD"
          user: "TEST_DB_USER"
          password: "$TEST_DB_PASSWORD"
          database: "TEST_DB_DATABASE"
          registry-user: ${{ matrix.registry_user }}
          registry-password: ${{ matrix.registry_password }}

      - name: Build with Maven java 8
        if: matrix.mvn_profile == 'java8'
        run: mvn clean test -P java8

      - name: Build with Maven
        if: matrix.mvn_profile == ''
        run: mvn clean test
