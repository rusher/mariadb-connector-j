---
name: Run CI Tests

on:
  push:
    branches: ['master', 'develop', 'feature/action']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TEST_DB_HOST: mariadb.example.com
  TEST_DB_PORT: 3306
  TEST_DB_USER: root
  TEST_DB_PASSWORD: 'heyPassw-!*20oRd'
  TEST_DB_DATABASE: testj

jobs:
  initial-test:
    timeout-minutes: 50
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java_version: ['21']
        tag: ['10.6']
        include:
          - type: 'community'
          - type: 'community'
            os: windows-latest
          - type: 'community'
            os: macos-latest
          - type: 'enterprise'
            if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - run: echo "127.0.0.1 mariadb.example.com" | sudo tee -a /etc/hosts
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java_version }}
          cache: maven
          distribution: 'adopt'

      - name: Setup Database
        uses: rusher/setup-mariadb@v1.9
        with:
          tag: ${{ matrix.tag }}
          root-password: ${{ env.TEST_DB_PASSWORD }}
          database: ${{ env.TEST_DB_DATABASE }}
          registry: ${{ matrix.type == 'enterprise' && 'docker.mariadb.com/enterprise-server' || '' }}
          registry-user: ${{ matrix.type == 'enterprise' && secrets.ENTERPRISE_USER || '' }}
          registry-password: ${{ matrix.type == 'enterprise' && secrets.ENTERPRISE_TOKEN || '' }}

      - name: Run Tests
        run: mvn clean test

  full-test:
    timeout-minutes: 50
    runs-on: ubuntu-latest
    needs: initial-test
    strategy:
      matrix:
        include:
          - type: 'community'
            tag: '10.5'
            java_version: '21'
          - type: 'community'
            tag: '10.11'
            java_version: '21'
            additional-conf: '--max_allowed_packet=40M --innodb_log_file_size=400M'
          - type: 'community'
            tag: '11.4'
            java_version: '8'
            mvn_profile: 'java8'
          - type: 'community'
            tag: '11.4'
            java_version: '17'
          - type: 'enterprise'
            tag: '10.5'
            java_version: '21'
            if: github.event_name != 'pull_request'
          - type: 'enterprise'
            tag: '11.4'
            java_version: '21'
            if: github.event_name != 'pull_request'
          - type: 'mysql'
            tag: '8.0'
            java_version: '21'
    steps:
      - uses: actions/checkout@v4
      - run: echo "127.0.0.1 mariadb.example.com" | sudo tee -a /etc/hosts
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java_version }}
          cache: maven
          distribution: 'adopt'

      - name: Setup MariaDB
        if: matrix.type != 'mysql'
        uses: rusher/setup-mariadb@v1.9
        with:
          tag: ${{ matrix.tag }}
          root-password: ${{ env.TEST_DB_PASSWORD }}
          database: ${{ env.TEST_DB_DATABASE }}
          registry: ${{ matrix.type == 'enterprise' && 'docker.mariadb.com/enterprise-server' || '' }}
          registry-user: ${{ matrix.type == 'enterprise' && secrets.ENTERPRISE_USER || '' }}
          registry-password: ${{ matrix.type == 'enterprise' && secrets.ENTERPRISE_TOKEN || '' }}
          additional-conf: ${{ matrix.additional-conf }}

      - name: Setup MySQL
        if: matrix.type == 'mysql'
        uses: mirromutth/mysql-action@v1.1
        with:
          mysql version: ${{ matrix.tag }}
          mysql database: ${{ env.TEST_DB_DATABASE }}
          mysql root password: ${{ env.TEST_DB_PASSWORD }}

      - name: Run Tests
        run: mvn clean test ${{ matrix.mvn_profile && format('-P {0}', matrix.mvn_profile) || '' }}
